<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message Share Tool - MATIN</title>

    <style>
        /* рҹ’Ў бһҖбҹӮбһҹбһҳбҹ’бһҡбһҪбһӣ Body бһұбҹ’бһҷбһҠбһҫбһҡбһ–бҹҒбһүбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ бһ“бһ·бһ„бһӮбҹ’бһҳбһ¶бһ“бһ…бһ“бҹ’бһӣбҹ„бҹҮбһ‘бҹҶбһ“бҹҒбһҡ (Margin) */
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px; /* бһ‘бһ»бһҖбһ…бһ“бҹ’бһӣбҹ„бҹҮбһ”бһ“бҹ’бһҸбһ·бһ…бһ–бһёбһӮбҹӮбһҳбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* бһұбҹ’бһҷбһҖбһҳбҹ’бһ–бһҹбҹӢбһҷбҹүбһ¶бһ„бһ бҹ„бһ…бһҺбһ¶бһҹбҹӢбһҹбҹ’бһҳбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ */
        }

        h2 {
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 28px;
        }

        /* рҹ’Ў бһҖбҹӮбһҹбһҳбҹ’бһҡбһҪбһӣ Input/Textarea бһұбҹ’бһҷбһҠбһҫбһҡбһ–бҹҒбһүбһ‘бһ‘бһ№бһ„бһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ (бһҳбһ¶бһ“ margin бһҹбһ„бһҒбһ¶бһ„) */
        textarea, input {
            width: 100%; /* бһҠбһҫбһҡбһ–бҹҒбһүбһ‘бһ‘бһ№бһ„ Parent */
            max-width: 400px; /* бһҖбһ»бҹҶбһұбҹ’бһҷбһңбһ¶бһ’бҹҶбһ–бҹҒбһҖбһӣбһҫ Tablet */
            padding: 15px; /* бһҖбһҫбһ“ padding бһұбҹ’бһҷбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһҹбһҡбһҹбҹҒбһҡ */
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #222; /* бһ”бҹ’бһҸбһјбһҡбһ–бһҺбҹҢбһұбҹ’бһҷбһҹбҹ’бһҡбһҪбһӣбһҳбһҫбһӣ */
            color: white;
            font-size: 16px; /* бһ бһ¶бһҳ Browser бһҳбһ·бһ“бһұбҹ’бһҷ Zoom бһ–бҹҒбһӣбһ…бһ»бһ…бһҹбһҡбһҹбҹҒбһҡ */
            box-sizing: border-box; /* бһҡбһҖбҹ’бһҹбһ¶бһ‘бһ‘бһ№бһ„ 100% бһҡбһ¶бһ”бҹӢбһ‘бһ¶бҹҶбһ„ padding */
        }

        /* рҹ’Ў бһҖбҹӮбһҹбһҳбҹ’бһҡбһҪбһӣбһ”бҹҠбһјбһҸбһ»бһ„бһұбҹ’бһҷбһ’бҹҶ бһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһ…бһ»бһ… (Mobile-friendly) */
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        button {
            flex: 1; /* бһұбҹ’бһҷбһ”бҹҠбһјбһҸбһ»бһ„бһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһҳбһ¶бһ“бһ‘бҹҶбһ бҹҶбһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶ */
            padding: 15px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8; /* бһұбҹ’бһҷбһҳбһ¶бһ“ Effect бһ–бҹҒбһӣбһ…бһ»бһ… */
        }

        .generate {
            background: #ff3b3b;
            color: white;
        }

        .share {
            background: #2ecc71;
            color: white;
        }

        /* рҹ’Ў бһҖбҹӮбһҹбһҳбҹ’бһҡбһҪбһӣбһҖбһ“бҹ’бһӣбҹӮбһ„бһ”бһ„бҹ’бһ бһ¶бһүбһӣбһ‘бҹ’бһ’бһ•бһӣ бһұбҹ’бһҷбһҳбһҫбһӣбһ‘бҹ…бһҹбҹ’бһўбһ¶бһҸ бһ“бһ·бһ„бһ–бҹҒбһүбһ‘бһ‘бһ№бһ„ */
        #output {
            margin-top: 20px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            height: 250px; /* бһ”бһ„бҹ’бһҖбһҫбһ“бһҖбһҳбҹ’бһ–бһҹбҹӢбһ”бһ“бҹ’бһҸбһ·бһ… */
            overflow-y: auto; /* бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһўбһјбһҹбһ…бһ»бҹҮбһЎбһҫбһ„ */
            text-align: left; /* бһұбҹ’бһҷбһўбһҖбҹ’бһҹбһҡбһ“бҹ…бһҒбһ¶бһ„бһҶбҹ’бһңбҹҒбһ„ бһҹбҹ’бһҡбһҪбһӣбһҳбһҫбһӣбһӣбһ‘бҹ’бһ’бһ•бһӣ */
            font-family: monospace; /* бһұбҹ’бһҷбһўбһҖбҹ’бһҹбһҡбһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶ бһҹбҹ’бһҡбһҪбһӣбһҳбһҫбһӣбһҡбһ¶бһ”бҹӢбһӣбҹҒбһҒ */
            box-sizing: border-box;
            border: 1px solid #333;
        }

        /* рҹ’Ў бһ”бһ“бҹ’бһҗбҹӮбһҳ CSS бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбһҖбҹ’бһҹбһҡ BY:MATIN бһ“бҹ…бһ–бһёбһҖбҹ’бһҡбҹ„бһҳбһ”бһ„бҹ’бһўбһҹбҹӢ */
        .footer-credit {
            margin-top: auto; /* бһұбҹ’бһҷбһңбһ¶бһӣбҹ„бһҸбһ‘бҹ…бһҖбҹ’бһҡбҹ„бһҳбһӮбҹҒбһ”бһ„бҹ’бһўбһҹбҹӢ */
            padding-top: 20px;
            font-size: 12px;
            /* рҹ’Ў бһ”бҹ’бһҸбһјбһҡбһ–бһҺбҹҢбһ‘бҹ…бһҮбһ¶бһ–бһҺбҹҢбһ•бҹ’бһҖбһ¶бһҲбһјбһҖ */
            color: #ff69b4; /* бһ–бһҺбҹҢбһ•бҹ’бһҖбһ¶бһҲбһјбһҖ (Pink) */
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>

</head>

<body>

    <h2>CLONE TEXT</h2>

    <textarea id="message" rows="4" placeholder="бһҹбһҡбһҹбҹҒбһҡбһҹбһ¶бһҡбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮ... (Write message)"></textarea>

    <input type="number" id="count" placeholder="бһ…бҹҶбһ“бһҪбһ“бһҠбһ„ (Number e.g. 10000)">

    <div class="button-group">
        <button class="generate" onclick="generate()">бһ”бһ„бҹ’бһҖбһҫбһҸбһҹбһ¶бһҡ (Generate)</button>
        <button class="share" onclick="shareMsg()">бһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖ (Share)</button>
    </div>

    <div id="output">бһӣбһ‘бҹ’бһ’бһ•бһӣбһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮ...</div>

    <div class="footer-credit">BY:MATIN</div>

    <script>
        let finalMessage = "";

        function generate() {
            let msg = document.getElementById("message").value;
            let count = document.getElementById("count").value;

            // рҹ’Ў бһ”бһ“бҹ’бһҗбҹӮбһҳбһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ (Validation) бһҒбҹ’бһӣбҹҮбҹ—
            if (!msg) {
                alert("бһҹбһјбһҳбһҹбһҡбһҹбҹҒбһҡбһҹбһ¶бһҡбһҹбһ·бһ“!");
                return;
            }
            if (!count || count <= 0) {
                alert("бһҹбһјбһҳбһҠбһ¶бһҖбҹӢбһ…бҹҶбһ“бһҪбһ“бһҠбһ„бһұбҹ’бһҷбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң!");
                return;
            }

            finalMessage = "";
            let out = "";

            // рҹ’Ў бһҖбһҳбҹ’бһҡбһ·бһҸбһ…бҹҶбһ“бһҪбһ“бһўбһҸбһ·бһ”бһҡбһҳбһ¶бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ»бҹҶбһұбҹ’бһҷбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһӮбһ¶бҹҶбһ„ (бһ§бһ‘бһ¶бһ бһҡбһҺбҹҚбҹ– бҹЎбҹ бҹ бҹ бҹ )
            if (count > 10000) {
                alert("бһ…бҹҶбһ“бһҪбһ“бһ…бҹ’бһҡбһҫбһ“бһ–бҹҒбһҖбһ бһҫбһҷ! бһҹбһјбһҳбһҠбһ¶бһҖбҹӢбһҖбҹ’бһҡбҹ„бһҳ бҹЎбҹ бҹ бҹ бҹ  бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ¶бһҡбһӮбһ¶бҹҶбһ„бһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бҹ”");
                return;
            }

            for (let i = 1; i <= count; i++) {
                finalMessage += msg + "\n";
                // рҹ’Ў бһ”бҹ’бһҡбһҫ element innerText бһҮбҹҶбһ“бһҪбһҹ innerHTML бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ¶бһҡбһҠбһ¶бһҖбҹӢбһҖбһјбһҠ HTML
                out += i + ". " + msg + "<br>";
            }

            // рҹ’Ў бһ”бһ„бҹ’бһ бһ¶бһүбһӣбһ‘бҹ’бһ’бһ•бһӣбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫ textContent бһӮбһәбһҳбһ¶бһ“бһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ–бһҮбһ¶бһ„ (бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ”бһҫбһ”бһ„бһ…бһ„бҹӢбһ”бҹ’бһҡбһҫ <br> бһҸбҹ’бһҡбһјбһңбһ”бҹ’бһҡбһҫ innerHTML бһҠбһјбһ…бһҠбһҫбһҳ)
            document.getElementById("output").innerHTML = out;
            
            // рҹ’Ў бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бһ„бҹ’бһҖбһҫбһҸбһҡбһҪбһ… бһұбҹ’бһҷбһңбһ¶бһўбһјбһҹбһ…бһ»бҹҮбһ‘бҹ…бһҖбҹ’бһҡбҹ„бһҳбһӮбҹҒбһ”бһ„бҹ’бһўбһҹбҹӢбһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·
            let outputDiv = document.getElementById("output");
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function shareMsg() {
            // рҹ’Ў бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҗбһ¶бһҹбһ¶бһҡбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ„бҹ’бһҖбһҫбһҸбһ¬бһ“бҹ…
            if (!finalMessage) {
                alert("бһҹбһјбһҳбһ…бһ»бһ…бһ”бҹҠбһјбһҸбһ»бһ„ 'бһ”бһ„бҹ’бһҖбһҫбһҸбһҹбһ¶бһҡ' бһҹбһ·бһ“ бһҳбһ»бһ“бһ“бһ№бһ„бһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖ!");
                return;
            }

            if (navigator.share) {
                navigator.share({
                    title: "бһҹбһ¶бһҡбһ–бһё MATIN Tool",
                    text: finalMessage
                })
                .then(() => console.log('бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбһҮбҹ„бһӮбһҮбҹҗбһҷ'))
                .catch((error) => console.log('бһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶бһ–бҹҒбһӣбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖ:', error));
            } else {
                // рҹ’Ў бһ”бһҫ Browser бһҳбһ·бһ“ Support бһұбҹ’бһҷбһңбһ¶ Copy бһҮбҹҶбһ“бһҪбһҹбһңбһ·бһү (Optional)
                navigator.clipboard.writeText(finalMessage).then(function() {
                    alert("Browser бһ”бһ„бһҳбһ·бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҖбһ¶бһҡ Share бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһ‘бҹҒ! бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҷбһҫбһ„бһ”бһ¶бһ“ Copy бһҹбһ¶бһҡбһ“бҹҒбҹҮбһ‘бҹ…бһҖбҹ’бһ“бһ»бһ„ Clipboard бһ бһҫбһҷ бһ”бһ„бһўбһ¶бһ…бһҷбһҖбһ‘бҹ… Pass бһ”бһ¶бһ“бҹ”");
                }, function(err) {
                    alert("бһҹбҹ„бһҖбһҹбҹ’бһҸбһ¶бһҷ! Browser бһҳбһ·бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҖбһ¶бһҡ Share бһЎбһҫбһҷбҹ”");
                });
            }
        }
    </script>
</body>
